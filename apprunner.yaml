version: 1.0
runtime: python311
build:
  commands:
    pre-build:
      - yum install -y gcc python3-devel libffi-devel
    build:
      - pip install --upgrade pip
      - pip install --no-cache-dir -r requirements.txt
run:
  command: python -m uvicorn main:app --host 0.0.0.0 --port 8080
  network:
    port: 8080
  env:
    - name: PYTHONUNBUFFERED
      value: "1"
